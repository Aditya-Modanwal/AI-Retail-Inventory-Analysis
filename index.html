<!DOCTYPE html>
<html>
<head>
<title>AI Retail Health Dashboard</title>

<style>

body{
font-family:Arial;
background:#f4f6f8;
padding:40px;
}

table{
border-collapse:collapse;
width:80%;
background:white;
}

th,td{
padding:12px;
border:1px solid #ddd;
text-align:center;
}

th{
background:#2c3e50;
color:white;
}

</style>

</head>

<body>

<h2>AI Retail Inventory Health Dashboard</h2>

<table>
    <h3>Sales Trend</h3>

<img src="{{ chart }}" width="600">

<tr>
<th>Product</th>
<th>Current Stock</th>
<th>Avg Daily Sales</th>
<th>Coverage Days</th>
<th>Status</th>
</tr>

{% for r in results %}

<tr>
<td>{{ r.product }}</td>
<td>{{ r.stock }}</td>
<td>{{ r.daily_sales }}</td>
<td>{{ r.coverage }}</td>
<td>{{ r.status }}</td>
</tr>

{% endfor %}

</table>

</body>
</html>
